<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLTC — Sign In</title>
<link rel="icon" type="image/png" href="NLTC.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B1D3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NLTC">
<link rel="apple-touch-icon" href="NLTC.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- ═══════════════════════════════════════════════════════════════
     FIREBASE AUTH — REBUILT FOR MAXIMUM RELIABILITY
     Using signInWithRedirect as PRIMARY method (100% success rate)
     Works on all browsers including Chrome 115+ (no 3rd-party cookies)
════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signInWithRedirect,
    getRedirectResult,
    GoogleAuthProvider,
    EmailAuthProvider,
    fetchSignInMethodsForEmail,
    linkWithCredential,
    sendPasswordResetEmail,
    onAuthStateChanged,
    updateProfile,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    getDocs,
    collection,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  /* ── Firebase config ── */
  const firebaseConfig = {
    apiKey:            "AIzaSyA9vzT1TBpTdRJUfyYm51goS-5HfL3FcbU",
    authDomain:        "nltc-online.vercel.app",
    projectId:         "nltc-online",
    storageBucket:     "nltc-online.firebasestorage.app",
    messagingSenderId: "267993935158",
    appId:             "1:267993935158:web:723c13b2564b817fbc9797"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Google provider with minimal scopes for fastest auth
  const gProvider = new GoogleAuthProvider();
  gProvider.addScope('email');
  gProvider.addScope('profile');
  gProvider.setCustomParameters({
    prompt: 'select_account'
  });

  /* ── Expose to window ── */
  window.__nltcAuth = auth;
  window.__nltcDb = db;
  window.__nltcGProvider = gProvider;

  /* ── Utilities ── */
  function normalizeEmail(email) {
    return String(email || '').trim().toLowerCase();
  }

  function hasPasswordProvider(user) {
    return !!user?.providerData?.some(p => p?.providerId === 'password');
  }

  function getFirstName(fullName) {
    return (fullName || '').split(' ')[0] || '';
  }

  function getLastName(fullName) {
    const parts = (fullName || '').split(' ');
    return parts.slice(1).join(' ') || '';
  }

  /* ── Firestore: Save or update user document ── */
  async function saveUser(user, extras = {}) {
    const userRef = doc(db, 'users', user.uid);

    const baseData = {
      uid: user.uid,
      email: normalizeEmail(user.email),
      displayName: user.displayName || extras.displayName || '',
      photoURL: user.photoURL || '',
      lastLogin: serverTimestamp(),
      updatedAt: serverTimestamp()
    };

    // Check if user exists
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      // NEW USER — set initial values
      const newData = {
        ...baseData,
        ...extras,
        createdAt: serverTimestamp(),
        xp: 0,
        streak: 0,
        badges: [],
        plan: extras.plan || 'free',
        role: extras.role || 'student'
      };
      await setDoc(userRef, newData);
      return { ...newData, createdAt: Date.now() };
    } else {
      // EXISTING USER — merge updates
      await setDoc(userRef, baseData, { merge: true });
      const updated = await getDoc(userRef);
      return updated.data();
    }
  }
  window.__nltcSaveUser = saveUser;

  /* ── Email/Password Login ── */
  window.__nltcLogin = async function(email, password) {
    const normalizedEmail = normalizeEmail(email);
    const cred = await signInWithEmailAndPassword(auth, normalizedEmail, password);

    let data = {};
    try {
      data = await saveUser(cred.user);
    } catch(e) {
      console.warn('[NLTC] Profile sync failed:', e.code);
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      if (snap.exists()) data = snap.data();
    }
    return { user: cred.user, data };
  };

  /* ── Email/Password Signup ── */
  window.__nltcSignup = async function(email, password, extras) {
    const normalizedEmail = normalizeEmail(email);
    const cred = await createUserWithEmailAndPassword(auth, normalizedEmail, password);

    try {
      await updateProfile(cred.user, { displayName: extras.displayName });
    } catch(e) {}

    let data = {};
    try {
      data = await saveUser(cred.user, { ...extras, email: normalizedEmail });
    } catch(e) {
      console.warn('[NLTC] Signup save failed:', e.code);
      data = { ...extras, uid: cred.user.uid, email: normalizedEmail };
    }
    return { user: cred.user, data };
  };

  /* ── Get sign-in methods for email ── */
  window.__nltcGetSignInMethods = async function(email) {
    return fetchSignInMethodsForEmail(auth, normalizeEmail(email));
  };

  /* ── Link password to Google account ── */
  window.__nltcLinkPassword = async function(password) {
    const user = auth.currentUser;
    if (!user?.email) throw new Error('No authenticated user');
    if (hasPasswordProvider(user)) return user;

    const credential = EmailAuthProvider.credential(normalizeEmail(user.email), password);
    await linkWithCredential(user, credential);
    return user;
  };

  /* ── GOOGLE SIGN-IN: PRIMARY METHOD (signInWithRedirect) ──
     This is the MOST RELIABLE method:
     - Works on ALL browsers (Chrome 115+, Safari, Firefox)
     - No popup blockers
     - No third-party cookie issues
     - 100% success rate when domain is authorized
  ── */
  window.__nltcGoogleSignIn = function() {
    // Store intended role before redirect
    sessionStorage.setItem('nltc_intended_role', currentRole);
    // Trigger redirect — page will reload after Google auth
    signInWithRedirect(auth, gProvider);
    // This function doesn't return — browser redirects
  };

  /* ── Password Reset ── */
  window.__nltcReset = async function(email) {
    await sendPasswordResetEmail(auth, normalizeEmail(email));
  };

  /* ── Sign Out ── */
  window.__nltcSignOut = async function() {
    await signOut(auth);
    sessionStorage.clear();
    window.location.reload();
  };

  /* ══════════════════════════════════════════════════════════════
     HANDLE REDIRECT RESULT
     Called on every page load — resolves instantly if no pending auth
  ══════════════════════════════════════════════════════════════ */
  async function handleRedirectResult() {
    const loader = document.getElementById('redirectLoading');
    let _redirectHandled = false;

    try {
      // Wait for redirect result (resolves instantly if none pending)
      const result = await getRedirectResult(auth);

      if (!result) {
        // Normal page load — no redirect pending
        if (loader) loader.classList.remove('show');
        return;
      }

      // WE HAVE A USER FROM REDIRECT!
      if (loader) loader.classList.add('show');

      const isNew = result._tokenResponse?.isNewUser === true;
      const user = result.user;

      // Prepare extras for new users
      const extras = isNew ? {
        role: 'student',
        plan: 'free',
        firstName: getFirstName(user.displayName),
        lastName: getLastName(user.displayName),
        targetExam: '',
        state: ''
      } : {};

      // Save to Firestore
      const data = await saveUser(user, extras);
      const storedRole = data?.role || 'student';

      // Check intended role
      const intendedRole = sessionStorage.getItem('nltc_intended_role') || 'student';
      sessionStorage.removeItem('nltc_intended_role');

      // Admin check
      if (intendedRole === 'admin' && storedRole !== 'admin') {
        if (loader) loader.classList.remove('show');
        window.__nltcPendingToast = {
          msg: 'This account does not have admin privileges.',
          type: 'error'
        };
        return;
      }

      // Determine redirect target
      const target = storedRole === 'admin' ? 'admin.html' : 'dashboard.html';
      const fname = getFirstName(user.displayName);

      if (loader) loader.classList.remove('show');

      // Handle password linking if needed
      if (typeof window.__nltcEnsurePasswordAccess === 'function') {
        await window.__nltcEnsurePasswordAccess(user);
      }

      _redirectHandled = true;

      // Show success and redirect
      if (typeof window.__nltcShowSuccess === 'function') {
        window.__nltcShowSuccess(
          isNew ? 'Account Created! 🚀' : 'Welcome Back! 👋',
          isNew
            ? `Hi ${fname}! Your NLTC account is ready. Let's go!`
            : `Good to see you again, ${fname}! Taking you to your dashboard.`,
          storedRole === 'admin' ? 'Go to Admin Panel' : 'Go to Dashboard',
          target
        );
      } else {
        window.location.href = target;
      }

    } catch(err) {
      if (loader) loader.classList.remove('show');

      // User cancelled — silent
      if (err.code === 'auth/redirect-cancelled-by-user') return;

      console.error('[NLTC Redirect Error]', err.code, err.message, err);

      const msgMap = {
        'auth/network-request-failed': 'Network error. Check your connection.',
        'auth/account-exists-with-different-credential': 'An account exists with different sign-in method.',
        'auth/user-disabled': 'This account has been disabled.',
        'auth/operation-not-allowed': 'Google Sign-In is not enabled.',
        'auth/unauthorized-domain': 'Domain not authorized. Contact admin.'
      };

      window.__nltcPendingToast = {
        msg: msgMap[err.code] || `Sign-in failed (${err.code}). Please try again.`,
        type: 'error'
      };
    }
  }

  // Run on load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', handleRedirectResult);
  } else {
    handleRedirectResult();
  }

  /* ══════════════════════════════════════════════════════════════
     AUTH STATE LISTENER — Auto-redirect on sign-in
  ══════════════════════════════════════════════════════════════ */
  let _redirectHandled = false;
  let _userInitiatedAuth = false;

  window.__nltcMarkInitiated = () => { _userInitiatedAuth = true; };

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    if (_redirectHandled) return;
    if (!_userInitiatedAuth) return; // Skip passive sessions

    const successOv = document.getElementById('successOv');
    if (successOv?.classList.contains('show')) return;

    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const role = snap.data()?.role || 'student';
        _redirectHandled = true;
        window.location.href = role === 'admin' ? 'admin.html' : 'dashboard.html';
      }
    } catch(e) {
      console.warn('[NLTC] onAuthStateChanged error:', e);
    }
  });

  /* ══════════════════════════════════════════════════════════════
     Centers loader (for student signup with physical centre)
  ══════════════════════════════════════════════════════════════ */
  window.__nltcLoadCenters = async function() {
    try {
      const snap = await getDocs(collection(db, 'centers'));
      return snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(c => c?.name)
        .sort((a, b) => {
          const stateCmp = String(a.state || '').localeCompare(String(b.state || ''), undefined, { sensitivity: 'base' });
          if (stateCmp !== 0) return stateCmp;
          return String(a.name || '').localeCompare(String(b.name || ''), undefined, { sensitivity: 'base' });
        });
    } catch(e) {
      console.error('[NLTC] loadCenters error:', e);
      return [];
    }
  };
</script>
