<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NLTC — Live Class</title>
<link rel="icon" type="image/png" href="NLTC.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>

<style>
/* ═══════════════════════════ VARIABLES ═══════════════════════════ */
:root {
  --bg: #070B12;
  --bg-2: #0C1220;
  --bg-3: #111826;
  --bg-4: #1A2435;
  --surface: rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --surface-3: rgba(255,255,255,0.11);
  --border: rgba(255,255,255,0.08);
  --border-2: rgba(255,255,255,0.14);
  --gold: #F5A623;
  --gold-2: #FFCA54;
  --gold-glow: rgba(245,166,35,0.25);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.15);
  --red-border: rgba(239,68,68,0.3);
  --green: #10B981;
  --blue: #3B82F6;
  --text-1: #F0F4FF;
  --text-2: #8FA3BF;
  --text-3: #4A5E78;
  --font: 'Plus Jakarta Sans', sans-serif;
  --font-head: 'Syne', sans-serif;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
  --ctrl-h: 72px;
  --header-h: 56px;
  --panel-w: 300px;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}

/* ═══════════════════════════ RESET ═══════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; overflow:hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input { font-family: var(--font); }
a { text-decoration: none; color: inherit; }
button, a { touch-action: manipulation; }

/* ═══════════════════════════ LAYOUT ═══════════════════════════ */
.ls-wrap {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* ═══════════════════════════ HEADER ═══════════════════════════ */
.ls-header {
  height: var(--header-h);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 50;
}
.ls-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  text-decoration: none;
}
.ls-logo-img { height: 26px; width: auto; object-fit: contain; display: block; }

.ls-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: .7rem; font-weight: 800;
  color: var(--red);
  flex-shrink: 0;
}
.live-pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red);
  animation: pulse-live 1.2s infinite;
}
@keyframes pulse-live {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(.7); }
}

.ls-session-info {
  flex: 1; min-width: 0;
}
.ls-session-title {
  font-family: var(--font-head);
  font-size: .9rem; font-weight: 800;
  color: var(--text-1);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: -.01em;
}
.ls-session-meta {
  font-size: .68rem; color: var(--text-2); margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.ls-header-actions {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.ls-stat-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: .7rem; font-weight: 600;
  color: var(--text-2);
}
.ls-stat-chip i { font-size: .62rem; }
.ls-icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: .78rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.ls-icon-btn:hover { background: var(--surface-2); color: var(--text-1); }
.ls-icon-btn.danger { color: #FCA5A5; background: var(--red-bg); border-color: var(--red-border); }
.ls-icon-btn.danger:hover { background: rgba(239,68,68,.3); }
.ls-icon-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

/* ═══════════════════════════ BODY ═══════════════════════════ */
.ls-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ═══════════════════════════ MAIN STAGE ═══════════════════════════ */
.ls-stage-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  background: var(--bg);
}

/* Main video area */
.ls-main-video {
  flex: 1;
  position: relative;
  background: #020406;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.ls-main-video video,
.ls-main-video .agora-video-player,
.ls-main-video .agora-video-player video,
#mainVideoContainer > div,
#mainVideoContainer video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}
#mainVideoContainer {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
}

/* No-video placeholder */
.ls-no-stream {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text-3);
  z-index: 1;
}
.ls-no-stream-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  animation: breathe 3s ease infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: .6; }
  50% { transform: scale(1.04); opacity: 1; }
}
.ls-no-stream-text { font-size: .82rem; text-align: center; line-height: 1.6; max-width: 220px; }

/* Main video label */
.ls-main-label {
  position: absolute;
  bottom: 14px; left: 14px;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.08);
  padding: 5px 12px;
  border-radius: 100px;
  font-size: .72rem; font-weight: 700;
  color: var(--text-1);
  display: flex; align-items: center; gap: 6px;
  z-index: 5;
}
.ls-main-label-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

/* Host badge (admin only) */
.host-badge {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--gold);
  color: #0A1628;
  font-size: .66rem; font-weight: 800;
  padding: 3px 9px;
  border-radius: 100px;
  letter-spacing: .04em;
  text-transform: uppercase;
  z-index: 5;
  display: none;
}

/* Self-preview (draggable PiP) */
.ls-pip {
  position: absolute;
  bottom: 70px; right: 14px;
  width: 120px; height: 80px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,.18);
  box-shadow: 0 4px 20px rgba(0,0,0,.6);
  cursor: move;
  z-index: 10;
  transition: border-color .2s;
  background: #111;
}
.ls-pip:hover { border-color: var(--gold); }
.ls-pip video, .ls-pip > div { width:100%; height:100%; object-fit:cover; }
.ls-pip-label {
  position: absolute;
  bottom: 3px; left: 0; right: 0;
  text-align: center;
  font-size: .58rem; font-weight: 700;
  color: rgba(255,255,255,.8);
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,.9);
}
.ls-pip-cam-off {
  width:100%; height:100%;
  background: var(--bg-3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
}

/* ═══════════════════════════ PARTICIPANT STRIP ═══════════════════════════ */
.ls-participant-strip {
  background: rgba(0,0,0,.5);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  overflow-x: auto;
  flex-shrink: 0;
  min-height: 80px;
  scrollbar-width: none;
}
.ls-participant-strip::-webkit-scrollbar { display: none; }
.ls-strip-label {
  font-size: .64rem; font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .08em;
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: 4px;
}
.ls-tile {
  position: relative;
  width: 96px; height: 62px;
  background: var(--bg-3);
  border-radius: 9px;
  overflow: hidden;
  cursor: pointer;
  flex-shrink: 0;
  border: 2px solid transparent;
  transition: all .2s;
}
.ls-tile:hover { border-color: rgba(255,255,255,.25); }
.ls-tile.main-view { border-color: var(--gold); }
.ls-tile.is-muted .ls-tile-mute { display: flex; }
.ls-tile video { width:100%; height:100%; object-fit:cover; }
.ls-tile-placeholder {
  width:100%; height:100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--bg-3), var(--bg-4));
  font-size: 1.1rem;
}
.ls-tile-name {
  position: absolute;
  bottom: 3px; left: 0; right: 0;
  text-align: center;
  font-size: .57rem; font-weight: 700;
  color: rgba(255,255,255,.75);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 0 4px;
  text-shadow: 0 1px 4px rgba(0,0,0,.9);
}
.ls-tile-mute {
  position: absolute;
  top: 4px; right: 4px;
  width: 16px; height: 16px;
  background: var(--red);
  border-radius: 50%;
  display: none;
  align-items: center; justify-content: center;
  font-size: .45rem; color: white;
}
/* Admin controls overlay on tile */
.ls-tile-admin-controls {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
  padding: 4px 4px 0;
  display: none;
  gap: 3px;
  z-index: 5;
}
.ls-tile:hover .ls-tile-admin-controls { display: flex; }
.ls-tile-ctrl {
  width: 18px; height: 18px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: .5rem;
  cursor: pointer;
  transition: all .15s;
}
.ls-tile-ctrl.mute-btn { background: rgba(245,166,35,.8); color: #0A1628; }
.ls-tile-ctrl.mute-btn:hover { background: var(--gold); }
.ls-tile-ctrl.remove-btn { background: rgba(239,68,68,.8); color: white; }
.ls-tile-ctrl.remove-btn:hover { background: var(--red); }

/* ═══════════════════════════ CONTROLS BAR ═══════════════════════════ */
.ls-controls {
  height: var(--ctrl-h);
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 16px;
  flex-shrink: 0;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.ls-controls::-webkit-scrollbar { display: none; }

.ctrl-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 8px 14px;
  min-width: 56px;
  transition: all var(--transition);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}
.ctrl-btn:hover { background: var(--surface-2); border-color: var(--border-2); }
.ctrl-btn.off { background: var(--red-bg); border-color: var(--red-border); }
.ctrl-btn.off .ctrl-icon { color: #FCA5A5; }
.ctrl-btn.active { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.3); }
.ctrl-btn.active .ctrl-icon { color: #93C5FD; }
.ctrl-icon { font-size: .88rem; color: rgba(255,255,255,.85); transition: color .15s; }
.ctrl-label { font-size: .57rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
.ctrl-sep { width: 1px; height: 38px; background: var(--border); flex-shrink: 0; }

.ctrl-btn.end-btn { background: rgba(239,68,68,.18); border-color: var(--red-border); }
.ctrl-btn.end-btn:hover { background: rgba(239,68,68,.32); }
.ctrl-btn.end-btn .ctrl-icon { color: #FCA5A5; }

/* Notification dot on ctrl */
.ctrl-notif {
  position: absolute;
  top: 5px; right: 5px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  border: 1.5px solid var(--bg-2);
  display: none;
}
.ctrl-notif.show { display: block; }

/* ═══════════════════════════ SIDE PANEL ═══════════════════════════ */
.ls-panel {
  width: var(--panel-w);
  background: var(--bg-2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform .3s ease, width .3s ease;
  overflow: hidden;
}
.ls-panel.hidden {
  width: 0;
  border-left: none;
}

.ls-panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ls-tab {
  flex: 1;
  padding: 10px 0;
  font-size: .71rem; font-weight: 700;
  color: var(--text-3);
  text-align: center;
  cursor: pointer;
  border: none; background: none;
  position: relative;
  transition: color var(--transition);
  white-space: nowrap;
}
.ls-tab:hover { color: var(--text-2); }
.ls-tab.active { color: var(--gold); }
.ls-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--gold);
  border-radius: 2px 2px 0 0;
}
.ls-tab-badge {
  display: inline-flex;
  align-items: center; justify-content: center;
  background: var(--red);
  color: white;
  font-size: .55rem; font-weight: 800;
  min-width: 14px; height: 14px;
  border-radius: 100px;
  padding: 0 3px;
  margin-left: 4px;
  vertical-align: middle;
}

.ls-panel-content {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.ls-pane {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  display: none;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.ls-pane::-webkit-scrollbar { width: 3px; }
.ls-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.ls-pane.active { display: block; }

/* Chat */
.chat-msgs { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg {
  display: flex; gap: 8px;
  animation: msgIn .2s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}
.chat-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .62rem; font-weight: 800;
  flex-shrink: 0;
  margin-top: 1px;
}
.chat-bubble { flex: 1; min-width: 0; }
.chat-name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
.chat-name { font-size: .72rem; font-weight: 700; color: var(--text-1); }
.chat-name.host { color: var(--gold); }
.chat-time { font-size: .6rem; color: var(--text-3); }
.chat-role-badge {
  font-size: .55rem; font-weight: 800;
  padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .04em;
}
.chat-role-badge.host { background: rgba(245,166,35,.2); color: var(--gold); }
.chat-role-badge.student { background: rgba(59,130,246,.15); color: #93C5FD; }
.chat-text { font-size: .77rem; color: var(--text-2); line-height: 1.5; word-break: break-word; }
.chat-text.is-emoji { font-size: 1.4rem; }

/* Pinned message */
.pinned-msg {
  background: rgba(245,166,35,.08);
  border-left: 2px solid var(--gold);
  padding: 7px 12px;
  font-size: .74rem;
  color: var(--text-2);
  display: none;
  flex-shrink: 0;
}
.pinned-msg.show { display: block; }
.pinned-msg strong { color: var(--gold); }

/* Chat input */
.chat-input-wrap {
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  display: flex; gap: 7px;
  flex-shrink: 0;
  background: var(--bg-2);
}
.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 11px;
  color: var(--text-1);
  font-size: .79rem;
  outline: none;
  transition: border-color .2s;
}
.chat-input::placeholder { color: var(--text-3); }
.chat-input:focus { border-color: rgba(245,166,35,.4); }
.chat-send {
  width: 34px; height: 34px;
  background: var(--gold);
  color: #0A1628;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .78rem;
  cursor: pointer; border: none;
  flex-shrink: 0;
  transition: all .18s;
}
.chat-send:hover { background: var(--gold-2); transform: scale(1.05); }

/* Participants panel */
.participants-list { padding: 8px 10px; }
.participant-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: var(--r-sm);
  transition: background .15s;
}
.participant-row:hover { background: var(--surface); }
.p-av {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; font-weight: 800;
  flex-shrink: 0;
}
.p-info { flex: 1; min-width: 0; }
.p-name { font-size: .8rem; font-weight: 700; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.p-role { font-size: .65rem; color: var(--text-3); }
.p-actions { display: flex; gap: 4px; flex-shrink: 0; }
.p-action-btn {
  width: 24px; height: 24px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: .58rem;
  cursor: pointer; border: none;
  transition: all .15s;
}
.p-action-btn.mute { background: rgba(245,166,35,.15); color: var(--gold); }
.p-action-btn.mute:hover { background: rgba(245,166,35,.3); }
.p-action-btn.remove { background: var(--red-bg); color: #FCA5A5; }
.p-action-btn.remove:hover { background: rgba(239,68,68,.3); }
.p-mute-icon { font-size: .55rem; }

/* Polls / Raise hands */
.raised-hands-section { padding: 10px 12px; }
.raised-hand-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px;
  background: rgba(245,166,35,.06);
  border: 1px solid rgba(245,166,35,.15);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
}
.raised-hand-item:last-child { margin-bottom: 0; }
.rh-name { flex: 1; font-size: .78rem; font-weight: 600; color: var(--text-2); }
.rh-dismiss {
  font-size: .65rem; color: var(--text-3);
  cursor: pointer; padding: 2px 6px;
  border-radius: 4px;
  transition: all .15s;
}
.rh-dismiss:hover { background: var(--surface-2); color: var(--text-1); }

/* ═══════════════════════════ LOADING SCREEN ═══════════════════════════ */
.ls-loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity .4s ease;
}
.ls-loading.fade-out { opacity: 0; pointer-events: none; }
.ls-loading-logo { display: flex; align-items: center; justify-content: center; }
.ls-loading-logo img { height: 36px; width: auto; object-fit: contain; }
.ls-loading-spinner {
  width: 30px; height: 30px;
  border: 2.5px solid var(--bg-4);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ls-loading-status { font-size: .78rem; color: var(--text-3); }

/* ═══════════════════════════ TOASTS ═══════════════════════════ */
#ls-toasts {
  position: fixed;
  top: 70px; right: 14px;
  z-index: 9998;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
  max-width: 280px;
}
.ls-toast {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 10px 13px;
  border-radius: var(--r-md);
  font-size: .79rem; font-weight: 500;
  pointer-events: all;
  box-shadow: 0 8px 28px rgba(0,0,0,.5);
  animation: toastIn .25s ease;
}
.ls-toast.success { background: #0A2A18; color: var(--text-1); border-left: 3px solid var(--green); }
.ls-toast.error   { background: #2A0A0A; color: var(--text-1); border-left: 3px solid var(--red); }
.ls-toast.info    { background: var(--bg-3); color: var(--text-1); border-left: 3px solid var(--gold); }
.ls-toast.out { animation: toastOut .25s ease forwards; }
@keyframes toastIn  { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:none; } }
@keyframes toastOut { to   { opacity:0; transform:translateX(12px); } }

/* ═══════════════════════════ CONFIRM DIALOG ═══════════════════════════ */
.ls-confirm-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 10000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 16px;
}
.ls-confirm-overlay.show { display: flex; }
.ls-confirm-box {
  background: var(--bg-3);
  border: 1px solid var(--border-2);
  border-radius: var(--r-xl);
  padding: 24px;
  width: 100%; max-width: 360px;
  box-shadow: 0 24px 60px rgba(0,0,0,.8);
  animation: confirmIn .22s ease;
}
@keyframes confirmIn { from { opacity:0; transform: scale(.96); } to { opacity:1; transform:none; } }
.ls-confirm-icon { font-size: 2rem; text-align: center; margin-bottom: 10px; }
.ls-confirm-title { font-family: var(--font-head); font-size: .96rem; font-weight: 800; color: var(--text-1); text-align: center; margin-bottom: 6px; }
.ls-confirm-sub { font-size: .78rem; color: var(--text-2); text-align: center; line-height: 1.6; margin-bottom: 18px; }
.ls-confirm-actions { display: flex; gap: 8px; }
.ls-confirm-cancel {
  flex: 1; padding: 10px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--r-sm);
  color: var(--text-2); font-size: .82rem; font-weight: 700;
  cursor: pointer; transition: all .18s;
}
.ls-confirm-cancel:hover { background: var(--surface-2); color: var(--text-1); }
.ls-confirm-ok {
  flex: 1; padding: 10px;
  background: rgba(239,68,68,.2);
  border: 1px solid var(--red-border);
  border-radius: var(--r-sm);
  color: #FCA5A5; font-size: .82rem; font-weight: 700;
  cursor: pointer; transition: all .18s;
}
.ls-confirm-ok:hover { background: rgba(239,68,68,.35); color: white; }

/* ═══════════════════════════ REACTIONS FLOAT ═══════════════════════════ */
#react-float {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 200;
  display: flex; gap: 10px;
}

/* ═══════════════════════════ QUALITY INDICATOR ═══════════════════════════ */
.quality-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.quality-dot.excellent { background: var(--green); }
.quality-dot.good      { background: #84CC16; }
.quality-dot.fair      { background: var(--gold); }
.quality-dot.poor      { background: var(--red); }

/* ═══════════════════════════ RESPONSIVE ═══════════════════════════ */
@media (max-width: 900px) {
  :root { --panel-w: 260px; }
}

/* ── Mobile tab bar (Chat / People / Hands) ── */
.mobile-panel-bar {
  display: none;
  flex-shrink: 0;
  height: 48px;
  background: var(--bg-2);
  border-top: 1px solid var(--border-2);
}
.mobile-panel-bar-inner { display: flex; height: 100%; }
.mob-tab-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 5px;
  font-size: .7rem; font-weight: 700;
  color: var(--text-3);
  background: none; border: none;
  cursor: pointer; touch-action: manipulation;
  transition: color .15s, background .15s;
  position: relative;
}
.mob-tab-btn.active { color: var(--gold); background: rgba(245,166,35,.06); }
.mob-tab-btn .mob-badge {
  position: absolute; top: 5px; right: calc(50% - 24px);
  min-width: 15px; height: 15px;
  background: var(--red); color: white;
  font-size: .52rem; font-weight: 800;
  border-radius: 100px; padding: 0 3px;
  display: none; align-items: center; justify-content: center;
}
.mob-tab-btn .mob-badge.show { display: flex; }

/* ══════════════════════════════════════════════════
   MOBILE LAYOUT  ≤ 700 px
   Strategy (Google Meet / Zoom model):
   • ls-wrap is a flex column filling 100dvh
   • ls-body fills remaining height (flex: 1)
   • ls-stage-wrap fills ls-body (flex: 1, position: relative)
   • ls-main-video fills the ENTIRE stage (position: absolute, inset: 0)
   • ls-participant-strip overlays the video bottom (absolute)
   • ls-controls overlays the very bottom (absolute, translucent)
   • ls-panel is a full-height overlay from the right
   • mobile-panel-bar is a flex row at the bottom of ls-wrap
══════════════════════════════════════════════════ */
@media (max-width: 700px) {
  :root { --ctrl-h: 60px; --header-h: 52px; }

  /* Show mobile tab bar as a normal flex child of ls-wrap */
  .mobile-panel-bar { display: flex; }

  /* Stage takes full body width — panel is fixed overlay, not flex sibling */
  .ls-body { overflow: hidden; }
  .ls-stage-wrap { width: 100% !important; flex: 1 !important; }

  /* Stage is the position context for all overlays */
  .ls-stage-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding-bottom: 0;
    min-height: 0;
  }

  /* Video fills the ENTIRE stage — maximum screen real estate */
  .ls-main-video {
    position: absolute !important;
    inset: 0 !important;
    height: auto !important;
    min-height: unset !important;
  }

  /* PiP stays in top-right area */
  .ls-pip {
    width: 88px; height: 58px;
    bottom: calc(var(--ctrl-h) + 68px);
    right: 10px;
  }

  /* Participant strip overlays the video — translucent, above controls */
  .ls-participant-strip {
    position: absolute;
    left: 0; right: 0;
    bottom: var(--ctrl-h);
    z-index: 20;
    background: rgba(5, 8, 16, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.07);
    min-height: 64px;
    max-height: 80px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .ls-participant-strip::-webkit-scrollbar { display: none; }
  .ls-tile { width: 76px; height: 50px; }

  /* Controls overlay at the very bottom of the stage */
  .ls-controls {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: var(--ctrl-h);
    z-index: 21;
    background: rgba(7, 11, 18, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.08);
    gap: 4px;
    padding: 0 6px;
    justify-content: space-evenly;
  }
  .ctrl-label { display: none; }
  .ctrl-btn { min-width: 40px; padding: 7px 8px; }
  .ctrl-sep { display: none; }

  /* Panel: full-height overlay from the right, covering the entire body */
  .ls-panel {
    position: fixed !important;
    top: var(--header-h) !important;
    bottom: 48px !important;   /* sits above the mobile tab bar */
    right: 0 !important;
    width: min(340px, 94vw) !important;
    z-index: 200 !important;
    transform: translateX(100%) !important;
    transition: transform .28s cubic-bezier(0.4,0,0.2,1) !important;
    border-left: 1px solid var(--border-2) !important;
    border-top: 1px solid var(--border-2) !important;
    display: flex !important;
    flex-direction: column !important;
  }
  .ls-panel.open {
    transform: translateX(0) !important;
    box-shadow: -8px 0 32px rgba(0,0,0,0.65) !important;
  }
  .ls-panel.hidden { transform: translateX(100%) !important; }

  /* Panel content area — flex-based height (more reliable than absolute on mobile) */
  .ls-panel .ls-panel-content {
    flex: 1 1 0 !important;
    min-height: 0 !important;
    overflow: hidden !important;
    position: relative !important;
    display: flex !important;
    flex-direction: column !important;
  }
  /* Panes use full flex height on mobile */
  .ls-panel .ls-pane {
    position: static !important;
    inset: auto !important;
    flex: 1 !important;
    min-height: 0 !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
    display: none !important;
    flex-direction: column !important;
  }
  .ls-panel .ls-pane.active {
    display: flex !important;
    flex-direction: column !important;
  }
  /* Chat messages list fills its pane */
  .ls-panel .ls-pane .chat-msgs,
  .ls-panel .ls-pane .participants-list,
  .ls-panel .ls-pane .raised-hands-section {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Hide desktop-only elements */
  .ls-session-meta { display: none !important; }
  .ls-stat-chip { display: none !important; }
}

@media (max-width: 420px) {
  :root { --ctrl-h: 56px; }
  .ls-tile { width: 66px; height: 44px; }
  .ls-pip { width: 78px; height: 52px; }
  .ctrl-btn { min-width: 36px; padding: 6px 7px; }
}

/* Landscape mobile — maximize video, hide strip, shrink header */
@media (max-height: 500px) and (orientation: landscape) {
  :root { --header-h: 42px; --ctrl-h: 48px; }
  .ls-participant-strip { display: none !important; }
  .ls-session-title { font-size: .78rem; }
  .ls-panel { top: var(--header-h) !important; bottom: 0 !important; }
  .mobile-panel-bar { display: none !important; }
}

/* ═══════════════════════════ UTILITIES ═══════════════════════════ */
.hidden { display: none !important; }
.sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
</style>

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyA9vzT1TBpTdRJUfyYm51goS-5HfL3FcbU",
  authDomain:"nltc-online.firebaseapp.com",

};
const AGORA_APP_ID  = '5eae75b2cc3d48cc84446b94d3877f88';
const BACKEND_URL   = 'https://nltc-backend.onrender.com';

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ──────────────── STATE ──────────────── */
let currentUser = null, userData = null;
let isAdmin = false, isHost = false;
let sessionId = null, sessionData = null;
let agoraClient = null;
let localAudioTrack = null, localVideoTrack = null, screenTrack = null;

let mainViewUid = null;
let chatUnsub = null, sessionUnsub = null;

let raisedHands = {}; // uid → name
let panelOpen = true;
let chatUnread = 0;

let hasSpokenToAgora = false;

const AV_COLORS = ['#E67E22','#2E86AB','#6C3483','#117A65','#922B21','#1B4F72','#1E8449','#00796B','#B7950B','#1A5276'];

/* ──────────────── HELPERS ──────────────── */
function fmt2(n){ return String(n).padStart(2,'0'); }
function timeStr(secs){ return `${fmt2(Math.floor(secs/60))}:${fmt2(secs%60)}`; }
function avatarInitials(name){ return (name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
function avatarColor(uid){ let h=0; for(const c of String(uid)){h=(h*31+c.charCodeAt(0))&0xFFFFFF;} return AV_COLORS[h%AV_COLORS.length]; }
function setLoadingStatus(msg){ document.getElementById('loadingStatus').textContent = msg; }
function hideLoading(){
  const el = document.getElementById('loadingScreen');
  el.classList.add('fade-out');
  setTimeout(()=>el.style.display='none', 420);
}

async function backendFetch(method, path, body=null){
  if (!currentUser) throw new Error('Not signed in');
  const token = await currentUser.getIdToken();
  const headers = { 'Authorization': `Bearer ${token}` };
  if (body) headers['Content-Type'] = 'application/json';
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${BACKEND_URL}/api${path}`, opts);
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
  return data;
}

/* ──────────────── CONFIRM DIALOG ──────────────── */
window.confirmReject = () => { if (confirmResolve) confirmResolve(false); document.getElementById('confirmOverlay').classList.remove('show'); };
window.confirmAccept = () => { if (confirmResolve) confirmResolve(true);  document.getElementById('confirmOverlay').classList.remove('show'); };
function showConfirm({ icon='⚠️', title='Are you sure?', sub='', okLabel='Confirm', okStyle='' }){

    document.getElementById('confirmSub').textContent = sub;

}

/* ──────────────── TOAST ──────────────── */
function showToast(msg, type='info'){
  const icons = { success:'fa-check-circle', error:'fa-times-circle', info:'fa-info-circle' };
  const t = document.createElement('div');
  t.className = `ls-toast ${type}`;
  t.innerHTML = `<i class="fas ${icons[type]||'fa-info-circle'}" style="flex-shrink:0;"></i><span>${msg}</span>`;
  document.getElementById('ls-toasts').appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),280); }, 4000);
}
window.showToast = showToast;

/* ──────────────── PARAMS ──────────────── */
function getParams(){
  const p = new URLSearchParams(location.search);
  return {
    sessionId: p.get('session') || p.get('id'),
    channel:   p.get('channel'),
    title:     p.get('title'),
    role:      p.get('role') || 'viewer', // 'host' | 'viewer'
  };
}

/* ──────────────── AUTH + BOOT ──────────────── */
onAuthStateChanged(auth, async user => {
  if (!user){ location.href = 'auth.html'; return; }
  currentUser = user;
  setLoadingStatus('Loading your profile…');
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    userData = snap.exists() ? snap.data() : {};
  } catch(e){ userData = {}; }
  isAdmin = userData.role === 'admin' || userData.role === 'super_admin';
  setupAdminUI();
  await bootSession();
});

function setupAdminUI(){
  if (!isAdmin) return;
  // Show admin controls
  ['ctrlMuteAll','ctrlRecord','settingsBtn','adminSep'].forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.classList.remove('hidden');
  });
  document.getElementById('endLabel').textContent = 'End Class';
}

async function bootSession(){
  const params = getParams();
  sessionId = params.sessionId;
  const channel = params.channel;
  isHost = isAdmin || params.role === 'host';

  if (isHost) {
    document.getElementById('hostBadge').style.display = 'block';
    document.getElementById('noStreamText').textContent = 'Your video is not yet published. Toggle camera to start.';
  }

  setLoadingStatus('Loading session info…');

  // Try to load session from Firestore
  if (sessionId) {
    try {
      const snap = await getDoc(doc(db,'liveSessions',sessionId));
      if (snap.exists()) {
        sessionData = { id: snap.id, ...snap.data() };
      }
    } catch(e){ console.warn('Session load:', e); }
  }

  if (sessionData) {
    document.getElementById('sessionTitle').textContent = sessionData.title || 'Live Class';
    document.getElementById('sessionMeta').textContent =
      `${sessionData.subject||'—'} · ${sessionData.hostName||'NLTC'} · ${sessionData.examType||''}`;
    document.getElementById('livePill').style.display = sessionData.status === 'live' ? 'flex' : 'none';
    document.title = `NLTC Live — ${sessionData.title||'Class'}`;
  } else if (params.title) {
    document.getElementById('sessionTitle').textContent = decodeURIComponent(params.title);
    document.getElementById('livePill').style.display = 'flex';
  }

  // Subscribe to session updates
  if (sessionId) {
    sessionUnsub = onSnapshot(doc(db,'liveSessions',sessionId), snap => {
      if (!snap.exists()) return;
      const data = snap.data();
      document.getElementById('viewerCountH').textContent = data.viewerCount || 0;
      document.getElementById('sessionTitle').textContent = data.title || 'Live Class';
      if (data.status === 'ended' && !isHost) {
        showToast('The class has ended.', 'info');
        setTimeout(()=> location.href = isAdmin ? 'admin.html' : 'student.html', 2500);
      }
      // Handle admin mute-all command
      if (!isHost && data.muteAll) {
        if (localAudioTrack) { localAudioTrack.setMuted(true); micOn = false; updateMicUI(); }
        showToast('You were muted by the host.', 'info');
      }
      // Handle individual mute by admin
      if (!isHost && data.mutedUsers?.[currentUser.uid]) {
        if (localAudioTrack) { localAudioTrack.setMuted(true); micOn = false; updateMicUI(); }
        showToast('You were muted by the host.', 'info');
        // Clear the flag so re-entry doesn't re-mute
        updateDoc(doc(db,'liveSessions',sessionId),{[`mutedUsers.${currentUser.uid}`]: false}).catch(()=>{});
      }
      // Handle individual remove (kick)
      if (data.kickedUsers?.[currentUser.uid]) {
        showToast('You were removed from this session by the host.', 'error');
        setTimeout(()=> leaveOrEnd(false), 1500);
      }
      // Handle pinned message
      if (data.pinnedMessage) {
        document.getElementById('pinnedText').textContent = data.pinnedMessage;
        document.getElementById('pinnedMsg').classList.add('show');
      } else {
        document.getElementById('pinnedMsg').classList.remove('show');
      }
    });
  }

  // Subscribe to chat
  if (sessionId) {
    const chatQ = query(
      collection(db,'liveSessions',sessionId,'messages'),
      orderBy('createdAt','asc'),
      limit(200)
    );
    chatUnsub = onSnapshot(chatQ, snap => {
      const msgs = document.getElementById('chatMsgs');
      const wasAtBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 40;
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const m = change.doc.data();
          appendChatMessage(m);
          // Count unread if panel not focused on chat
          const activePane = document.querySelector('.ls-pane.active');
          if (activePane?.id !== 'pane-chat') {
            chatUnread++;
            const badge = document.getElementById('chatBadge');
            badge.style.display = 'inline-flex';
            badge.textContent = chatUnread > 9 ? '9+' : chatUnread;
            const mb = document.getElementById('mobChatBadge');
            if (mb) { mb.textContent = chatUnread > 9 ? '9+' : chatUnread; mb.classList.add('show'); }
          }
        }
      });
      if (wasAtBottom) msgs.scrollTop = msgs.scrollHeight;
    });
  }

  // Connect to Agora
  const channelToJoin = channel || sessionData?.channel;
  if (channelToJoin) {
    setLoadingStatus('Connecting to stream…');
    await joinAgora(channelToJoin);
  } else {
    setLoadingStatus('No channel found.');
    setTimeout(hideLoading, 1000);
  }

  // Track viewer count — increment on join, decrement reliably on any kind of leave
  if (sessionId && !isHost) {
    try { await updateDoc(doc(db,'liveSessions',sessionId),{viewerCount:increment(1)}); } catch(e){}
    // Decrement when user closes/navigates away (pagehide is more reliable than beforeunload)
    window.addEventListener('pagehide', ()=>{
      try { updateDoc(doc(db,'liveSessions',sessionId),{viewerCount:increment(-1)}); } catch(e){}
    });
  }

  startDurationTimer();
  startTime = Date.now();
  updateParticipantsList();
  hideLoading();
}

/* ──────────────── AGORA ──────────────── */
async function joinAgora(channelName){
  try {
    const role = isHost ? 'host' : 'audience';
    let tokenData;
    try {
      tokenData = await backendFetch('POST','/agora/token',{channelName,role});
    } catch(e){
      // Fallback: try without token (dev mode)
      console.warn('Token fetch failed, trying null token:', e);
      tokenData = { token: null, uid: null, appId: AGORA_APP_ID };
    }

    agoraClient = AgoraRTC.createClient({ mode:'rtc', codec:'vp8' });

    // ── REMOTE USER PUBLISHED ──
    agoraClient.on('user-published', async(user, mediaType) => {
      await agoraClient.subscribe(user, mediaType);
      if (!remoteUsers[user.uid]) {
        remoteUsers[user.uid] = { uid: user.uid, name: `User ${String(user.uid).slice(-4)}` };
      }
      if (mediaType === 'video') {
        remoteUsers[user.uid].videoTrack = user.videoTrack;
        // If no main view yet, promote this user
        if (!mainViewUid) setMainView(user.uid);
        addOrUpdateTile(user.uid);
      }
      if (mediaType === 'audio') {
        remoteUsers[user.uid].audioTrack = user.audioTrack;
        user.audioTrack.play();
      }
      updateParticipantsList();
      updatePeopleCount();
    });

    agoraClient.on('user-unpublished', (user, mediaType) => {
      if (mediaType === 'video') {
        if (remoteUsers[user.uid]) remoteUsers[user.uid].videoTrack = null;
        if (mainViewUid === user.uid) {
          clearMainView();
          // Try next available
          const next = Object.values(remoteUsers).find(u=>u.videoTrack && u.uid !== user.uid);
          if (next) setMainView(next.uid);
        }
        removeTile(user.uid);
      }
      if (mediaType === 'audio') {
        if (remoteUsers[user.uid]) remoteUsers[user.uid].audioTrack = null;
      }
    });

    agoraClient.on('user-joined', user => {
      if (!remoteUsers[user.uid]) {
        remoteUsers[user.uid] = { uid: user.uid, name: `User ${String(user.uid).slice(-4)}` };
      }
      updateParticipantsList();
      updatePeopleCount();
      // Host updates Firestore viewer count from Agora's real user list
      if (isHost && sessionId) {
        const cnt = agoraClient.remoteUsers.length;
        updateDoc(doc(db,'liveSessions',sessionId),{ viewerCount: cnt }).catch(()=>{});
        document.getElementById('viewerCountH').textContent = cnt;
      }
    });

    agoraClient.on('user-left', user => {
      delete remoteUsers[user.uid];
      removeTile(user.uid);
      if (mainViewUid === user.uid) {
        clearMainView();
        const next = Object.values(remoteUsers).find(u=>u.videoTrack);
        if (next) setMainView(next.uid);
        else if (isHost && localVideoTrack) {
          // Revert to host self-view when the spotlighted user leaves
          setMainView('__self_host');
        }
      }
      updateParticipantsList();
      updatePeopleCount();
      // Host keeps Firestore count accurate
      if (isHost && sessionId) {
        const cnt = agoraClient.remoteUsers.length;
        updateDoc(doc(db,'liveSessions',sessionId),{ viewerCount: cnt }).catch(()=>{});
        document.getElementById('viewerCountH').textContent = cnt;
      }
    });

    agoraClient.on('token-privilege-will-expire', async() => {
      try {
        const r = await backendFetch('POST','/agora/token',{channelName,role});
        await agoraClient.renewToken(r.token);
      } catch(e){ console.warn('Token renewal failed:', e); }
    });

    agoraClient.on('network-quality', stats => {
      const q = stats.downlinkNetworkQuality;
      const labels = ['','Excellent','Good','Fair','Poor','Poor','Dead'];
      const classes = ['','excellent','good','good','fair','poor','poor'];
      const dot = document.getElementById('qualityDot');
      const lbl = document.getElementById('qualityLabel');
      if (dot) { dot.className = `quality-dot ${classes[q]||'poor'}`; }
      if (lbl) { lbl.textContent = labels[q] || '—'; }
    });

    // Join channel
    const uid = await agoraClient.join(
      tokenData.appId || AGORA_APP_ID,
      channelName,
      tokenData.token,
      tokenData.uid || null
    );

    // Host: auto-publish audio (not video until user enables)
    if (isHost) {
      try {
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await agoraClient.publish([localAudioTrack]);
        micOn = true;
        updateMicUI();
        showToast('Microphone connected. Toggle camera to go live.', 'info');
      } catch(e){
        console.warn('Mic init:', e);
        showToast('Could not access microphone.', 'error');
      }
      hasSpokenToAgora = true;
    } else {
      showToast('Connected to live class!', 'success');
    }

    // Add self to participants
    const myName = `${userData.firstName||''} ${userData.lastName||''}`.trim() || 'You';
    remoteUsers['__self'] = {
      uid: '__self',
      name: myName + ' (You)',
      role: isHost ? 'host' : 'student',
      isSelf: true,
    };
    updateParticipantsList();
    updatePeopleCount();

  } catch(e){
    console.error('Agora error:', e);
    showToast(`Stream error: ${e.message}`, 'error');
  }
}

/* ──────────────── VIDEO TILES ──────────────── */
function setMainView(uid){
  mainViewUid = uid;
  const container = document.getElementById('mainVideoContainer');
  container.innerHTML = '';

  // Special case: spotlighting self (host/admin)
  if (uid === '__self_host' && localVideoTrack) {
    const div = document.createElement('div');
    div.style.cssText = 'width:100%;height:100%;';
    container.appendChild(div);
    localVideoTrack.play(div);
    document.getElementById('noStream').style.display = 'none';
    document.getElementById('mainLabel').style.display = 'flex';
    document.getElementById('mainLabelText').textContent = 'You (Host)';
    document.getElementById('hostBadge').style.display = 'block';
    document.querySelectorAll('.ls-tile').forEach(t => t.classList.toggle('main-view', t.dataset.uid === '__self_host'));
    return;
  }

  const user = remoteUsers[uid];
  if (user?.videoTrack) {
    const div = document.createElement('div');
    div.style.cssText = 'width:100%;height:100%;';
    container.appendChild(div);
    user.videoTrack.play(div);
    document.getElementById('noStream').style.display = 'none';
    document.getElementById('mainLabel').style.display = 'flex';
    document.getElementById('mainLabelText').textContent = user.name || `User ${String(uid).slice(-4)}`;
    document.getElementById('hostBadge').style.display = 'none';
  }
  document.querySelectorAll('.ls-tile').forEach(t => {
    t.classList.toggle('main-view', t.dataset.uid === String(uid));
  });
}

function clearMainView(){
  mainViewUid = null;
  document.getElementById('mainVideoContainer').innerHTML = '';
  document.getElementById('noStream').style.display = 'flex';
  document.getElementById('mainLabel').style.display = 'none';
}

function addOrUpdateTile(uid){
  const strip = document.getElementById('participantStrip');
  let tile = strip.querySelector(`[data-uid="${uid}"]`);
  if (!tile) {
    tile = document.createElement('div');
    tile.className = 'ls-tile';
    tile.dataset.uid = uid;
    tile.onclick = () => setMainView(uid);
    tile.title = 'Click to view fullscreen';
    // Admin controls inside tile
    if (isAdmin) {
      tile.innerHTML = `
        <div class="ls-tile-admin-controls">
          <div class="ls-tile-ctrl spotlight-btn" onclick="event.stopPropagation();setMainView('${uid}')" title="Spotlight" style="background:rgba(245,166,35,.8);color:#0A1628;">
            <i class="fas fa-star"></i>
          </div>
          <div class="ls-tile-ctrl mute-btn" onclick="adminMuteUser(event,'${uid}')" title="Mute">
            <i class="fas fa-microphone-slash"></i>
          </div>
          <div class="ls-tile-ctrl remove-btn" onclick="adminRemoveUser(event,'${uid}')" title="Remove">
            <i class="fas fa-times"></i>
          </div>
        </div>
        <div class="ls-tile-placeholder">👤</div>
        <div class="ls-tile-name">User ${String(uid).slice(-4)}</div>
        <div class="ls-tile-mute"><i class="fas fa-microphone-slash"></i></div>`;
    } else {
      tile.innerHTML = `
        <div class="ls-tile-placeholder">👤</div>
        <div class="ls-tile-name">User ${String(uid).slice(-4)}</div>
        <div class="ls-tile-mute"><i class="fas fa-microphone-slash"></i></div>`;
    }
    strip.appendChild(tile);
  }
  const user = remoteUsers[uid];
  if (user?.videoTrack) {
    const ph = tile.querySelector('.ls-tile-placeholder');
    if (ph) { ph.innerHTML=''; ph.style.cssText='width:100%;height:100%;'; user.videoTrack.play(ph); }
  }
  if (user?.name) {
    const nameEl = tile.querySelector('.ls-tile-name');
    if (nameEl) nameEl.textContent = user.name.slice(0,16);
  }
  if (mutedByAdmin[uid]) tile.classList.add('is-muted');
  if (uid === mainViewUid) tile.classList.add('main-view');
}

function addSelfTile(){
  const strip = document.getElementById('participantStrip');
  if (strip.querySelector('[data-uid="__self_host"]')) return;
  const tile = document.createElement('div');
  tile.className = 'ls-tile main-view';
  tile.dataset.uid = '__self_host';
  tile.title = 'Spotlight yourself';
  tile.onclick = () => setMainView('__self_host');
  tile.innerHTML = `
    <div class="ls-tile-placeholder" style="background:var(--gold-glow);">🎤</div>
    <div class="ls-tile-name" style="color:var(--gold);">You (Host)</div>`;
  strip.insertBefore(tile, strip.firstChild.nextSibling); // after label
  // Play local video in the tile
  if (localVideoTrack) {
    const ph = tile.querySelector('.ls-tile-placeholder');
    if (ph) { ph.innerHTML=''; ph.style.cssText='width:100%;height:100%;'; localVideoTrack.play(ph); }
  }
}

function removeTile(uid){
  const strip = document.getElementById('participantStrip');
  const tile = strip.querySelector(`[data-uid="${uid}"]`);
  if (tile) tile.remove();
}

/* ──────────────── CONTROLS ──────────────── */
window.toggleMic = async function(){
  if (!agoraClient) return;
  micOn = !micOn;
  if (micOn) {
    try {
      if (!localAudioTrack) {
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await agoraClient.publish([localAudioTrack]);
      } else {
        await localAudioTrack.setMuted(false);
      }
    } catch(e){ micOn = false; showToast('Microphone access denied','error'); }
  } else {
    if (localAudioTrack) await localAudioTrack.setMuted(true);
  }
  updateMicUI();
};

window.toggleCam = async function(){
  if (!agoraClient) return;
  camOn = !camOn;
  if (camOn) {
    try {
      if (!localVideoTrack) {
        localVideoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig:'480p_2' });
        await agoraClient.publish([localVideoTrack]);
      } else {
        await localVideoTrack.setMuted(false);
        await agoraClient.publish([localVideoTrack]);
      }
      // Play in PiP
      const pipEl = document.getElementById('pipVideoEl');
      pipEl.style.display = 'block';
      document.getElementById('pipCamOff').style.display = 'none';
      localVideoTrack.play(pipEl);
      // Host always defaults to spotlighting themselves when camera is first turned on
      if (isHost && (!mainViewUid || mainViewUid === '__self_host')) {
        setMainView('__self_host');
      }
      // Add self-tile to participant strip so host can re-spotlight themselves
      if (isHost) addSelfTile();
    } catch(e){ camOn = false; showToast('Camera access denied','error'); }
  } else {
    if (localVideoTrack) {
      await localVideoTrack.setMuted(true);
      await agoraClient.unpublish([localVideoTrack]).catch(()=>{});
    }
    document.getElementById('pipVideoEl').style.display='none';
    document.getElementById('pipCamOff').style.display='flex';
  }
  updateCamUI();
};

window.toggleScreenShare = async function(){
  if (!agoraClient) return;
  if (screenSharing) {
    if (screenTrack) {
      await agoraClient.unpublish([screenTrack]).catch(()=>{});
      screenTrack.close();
      screenTrack = null;
    }
    screenSharing = false;
    document.getElementById('ctrlScreenShare').classList.remove('active');
    showToast('Screen sharing stopped.','info');
  } else {
    // iOS Safari does not support getDisplayMedia at all
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) && !/CriOS/.test(navigator.userAgent);
    if (isIOS || !navigator.mediaDevices?.getDisplayMedia) {
      showToast('Screen sharing is not supported on this device or browser. Use Chrome on Android or a desktop browser.','error');
      return;
    }
    try {
      screenTrack = await AgoraRTC.createScreenVideoTrack({encoderConfig:'1080p_1'}, 'disable');
      await agoraClient.publish([screenTrack]);
      screenSharing = true;
      document.getElementById('ctrlScreenShare').classList.add('active');
      showToast('Screen sharing started.','success');
      screenTrack.on('track-ended', ()=>{ window.toggleScreenShare(); });
    } catch(e){
      if (e.code !== 'PERMISSION_DENIED') showToast('Could not share screen: ' + (e.message||'Permission denied.'),'error');
    }
  }
};

window.toggleRaiseHand = async function(){

window.toggleRecord = async function(){

/* ──────────────── ADMIN CONTROLS ──────────────── */
window.adminMuteUser = async function(e, uid){
  e.stopPropagation();
  if (!isAdmin) return;
  const confirmed = await showConfirm({
    icon:'🔇', title:'Mute this participant?',
    sub:'They will be notified and their microphone will be disabled.',
    okLabel:'Mute', okStyle:''
  });
  if (!confirmed) return;
  mutedByAdmin[uid] = true;
  if (sessionId) {
    try {
      await updateDoc(doc(db,'liveSessions',sessionId),{
        [`mutedUsers.${uid}`]: true,

    } catch(e) { showToast('Could not mute: ' + (e.message||e.code),'error'); return; }
  }
  const tile = document.getElementById('participantStrip').querySelector(`[data-uid="${uid}"]`);
  if (tile) tile.classList.add('is-muted');
  updateParticipantsList();
  showToast('Participant muted.','success');

window.adminRemoveUser = async function(e, uid){
  e.stopPropagation();
  if (!isAdmin) return;
  const confirmed = await showConfirm({
    icon:'🚫', title:'Remove participant?',
    sub:'This will disconnect them from the session. They cannot rejoin unless you allow.',
    okLabel:'Remove', okStyle:'color:#FCA5A5;background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.4);'
  });
  if (!confirmed) return;
  if (sessionId) {
    try {
      await updateDoc(doc(db,'liveSessions',sessionId),{ [`kickedUsers.${uid}`]: true });
    } catch(e) { showToast('Could not remove participant: ' + (e.message||e.code),'error'); return; }
  }
  showToast('Participant removed from session.','success');
};

let muteAllActive = false;
window.muteAllParticipants = async function(){
  if (!isAdmin) return;
  if (!muteAllActive) {
    const confirmed = await showConfirm({
      icon:'🔇', title:'Mute everyone?',
      sub:'All participants will have their microphones disabled. You can unmute them again.',
      okLabel:'Mute All'
    });
    if (!confirmed) return;
    muteAllActive = true;
    if (sessionId) {
      await updateDoc(doc(db,'liveSessions',sessionId),{
        muteAll: true,
        muteAllAt: serverTimestamp()
      }).catch(()=>{});
    }
    const btn = document.getElementById('ctrlMuteAll');
    if (btn) {
      btn.classList.add('active');
      btn.querySelector('.ctrl-label').textContent = 'Unmute';
      btn.title = 'Unmute everyone';
    }
    showToast('All participants muted.','success');
  } else {
    muteAllActive = false;
    if (sessionId) {
      await updateDoc(doc(db,'liveSessions',sessionId),{ muteAll: false }).catch(()=>{});
    }
    const btn = document.getElementById('ctrlMuteAll');
    if (btn) {
      btn.classList.remove('active');
      btn.querySelector('.ctrl-label').textContent = 'Mute All';
      btn.title = 'Mute everyone';
    }
    showToast('All participants can speak again.','info');
  }
};

/* Dismiss raised hand (admin) */
window.dismissHand = async function(uid){
  if (!isAdmin) return;
  if (sessionId) {
    await updateDoc(doc(db,'liveSessions',sessionId),{
      [`raisedHands.${uid}`]: null,
    }).catch(()=>{});
  }
  delete raisedHands[uid];
  renderRaisedHands();
};

/* ──────────────── PARTICIPANTS UI ──────────────── */
function updateParticipantsList(){
  const list = document.getElementById('participantsList');
  const users = Object.values(remoteUsers);
  if (!users.length) {
    list.innerHTML='<div style="padding:20px;text-align:center;font-size:.76rem;color:var(--text-3);">No other participants</div>';
    return;
  }
  list.innerHTML = users.map(u=>{
    const isMuted = mutedByAdmin[u.uid] || false;
    const spotlightUid = u.isSelf ? '__self_host' : u.uid;
    const spotlightBtn = `<button class="p-action-btn" onclick="setMainView('${spotlightUid}')" title="Spotlight" style="background:rgba(245,166,35,.15);color:var(--gold);">
        <i class="fas fa-star p-mute-icon"></i>
      </button>`;
    const adminControls = (isAdmin && !u.isSelf) ? `
      <div class="p-actions">
        ${spotlightBtn}
        <button class="p-action-btn mute" onclick="adminMuteUser(event,'${u.uid}')" title="Mute">
          <i class="fas fa-microphone-slash p-mute-icon"></i>
        </button>
        <button class="p-action-btn remove" onclick="adminRemoveUser(event,'${u.uid}')" title="Remove">
          <i class="fas fa-times p-mute-icon"></i>
        </button>
      </div>` : (u.isSelf ? `<div class="p-actions">${spotlightBtn}</div>` : '');
    return `<div class="participant-row">
      <div class="p-av" style="background:${avatarColor(u.uid)};">${avatarInitials(u.name)}</div>
      <div class="p-info">
        <div class="p-name">${u.name||'Participant'}</div>
        <div class="p-role">${u.role==='host'?'🎤 Host':`${isMuted?'🔇 Muted':'Student'}`}</div>
      </div>
      ${adminControls}
    </div>`;
  }).join('');
}

function updatePeopleCount(){
  const cnt = Object.keys(remoteUsers).length;
  const badge = document.getElementById('peopleBadge');
  if (cnt > 0) { badge.style.display='inline-flex'; badge.textContent=cnt; }
  else badge.style.display='none';
  // Sync mobile badge
  const mb = document.getElementById('mobPeopleBadge');
  if (mb) { if (cnt>0){ mb.textContent=cnt; mb.classList.add('show'); } else mb.classList.remove('show'); }
}

function renderRaisedHands(){
  const list = document.getElementById('raisedHandsList');
  const entries = Object.entries(raisedHands);
  const badge = document.getElementById('handsBadge');
  const notif = document.getElementById('handNotif');
  if (entries.length){
    badge.style.display='inline-flex'; badge.textContent=entries.length;
    notif.classList.add('show');
  } else {
    badge.style.display='none';
    notif.classList.remove('show');
  }
  // Sync mobile badge
  const mhb = document.getElementById('mobHandsBadge');
  if (mhb) { if (entries.length){ mhb.textContent=entries.length; mhb.classList.add('show'); } else mhb.classList.remove('show'); }
  if (!entries.length){
    list.innerHTML='<div style="padding:20px;text-align:center;font-size:.76rem;color:var(--text-3);">No raised hands yet</div>';
    return;
  }
  list.innerHTML = entries.map(([uid,name])=>`
    <div class="raised-hand-item">
      <span style="font-size:1rem;">✋</span>
      <span class="rh-name">${name}</span>
      ${isAdmin?`<span class="rh-dismiss" onclick="dismissHand('${uid}')">Dismiss</span>`:''}
    </div>`).join('');
}

/* ──────────────── CHAT ──────────────── */
const EMOJI_RE = /^[\p{Emoji}\s]+$/u;

function appendChatMessage(m){
  const msgs = document.getElementById('chatMsgs');
  const div  = document.createElement('div');
  div.className = 'chat-msg';
  const isMyMsg = m.senderId === currentUser.uid;
  const isHostMsg = m.role === 'admin' || m.role === 'host';
  const timeStr2 = m.createdAt?.seconds
    ? new Date(m.createdAt.seconds*1000).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'})
    : '';
  const isEmoji = m.text && EMOJI_RE.test(m.text.trim()) && m.text.trim().length <= 4;
  const roleBadge = isHostMsg
    ? `<span class="chat-role-badge host">Host</span>`
    : `<span class="chat-role-badge student">Student</span>`;
  const pinBtn = isAdmin && !isHostMsg
    ? `<span style="margin-left:4px;cursor:pointer;font-size:.6rem;color:var(--text-3);" onclick="pinMessage('${(m.text||'').replace(/'/g,"\\'")}')">📌</span>`
    : '';
  div.innerHTML = `
    <div class="chat-av" style="background:${avatarColor(m.senderId||'x')};">${avatarInitials(m.senderName||'?')}</div>
    <div class="chat-bubble">
      <div class="chat-name-row">
        <span class="chat-name ${isHostMsg?'host':''}">${m.senderName||'User'}</span>
        ${roleBadge}
        <span class="chat-time">${timeStr2}</span>
        ${pinBtn}
      </div>
      <div class="chat-text ${isEmoji?'is-emoji':''}">${escapeHtml(m.text||'')}</div>
    </div>`;
  msgs.appendChild(div);
}

window.sendChat = async function(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !sessionId) return;
  input.value = '';
  const myName = `${userData.firstName||''} ${userData.lastName||''}`.trim() || currentUser.email || 'User';
  const role = isAdmin ? 'admin' : 'student';
  try {
    await addDoc(collection(db,'liveSessions',sessionId,'messages'),{
      text, senderName:myName, senderId:currentUser.uid, role, createdAt:serverTimestamp()
    });
  } catch(e){ showToast('Could not send message.','error'); }
};

window.pinMessage = async function(text){
  if (!isAdmin || !sessionId) return;
  await updateDoc(doc(db,'liveSessions',sessionId),{pinnedMessage:text}).catch(()=>{});
  showToast('Message pinned!','success');
};

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ──────────────── REACTIONS ──────────────── */
window.sendReact = async function(emoji){
  const ct = document.getElementById('react-float');
  const el = document.createElement('div');
  el.style.cssText='font-size:1.8rem;animation:reactFloat 2.5s ease forwards;';
  el.textContent = emoji;
  ct.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
  // Broadcast to chat
  if (sessionId) {
    const myName = `${userData.firstName||''} ${userData.lastName||''}`.trim() || 'User';
    await addDoc(collection(db,'liveSessions',sessionId,'messages'),{
      text:emoji, senderName:myName, senderId:currentUser.uid, role:isAdmin?'admin':'student', createdAt:serverTimestamp()
    }).catch(()=>{});
  }
};

function startDurationTimer(){
  clearInterval(durationInterval);
  let secs = 0;
  durationInterval = setInterval(()=>{
    secs++;
    document.getElementById('durationDisplay').textContent = timeStr(secs);
  }, 1000);
}

/* ──────────────── PANEL / TABS ──────────────── */
window.togglePanel = function(){
  panelOpen = !panelOpen;
  const panel = document.getElementById('sidePanel');
  const btn   = document.getElementById('panelToggleBtn');
  if (panelOpen) {
    panel.classList.add('open'); panel.classList.remove('hidden');
    btn.classList.add('active');
  } else {
    panel.classList.remove('open'); panel.classList.add('hidden');
    btn.classList.remove('active');
  }
};

window.switchTab = function(tab, btn){
  document.querySelectorAll('.ls-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.ls-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  if (tab === 'chat') {
    chatUnread = 0;
    const badge = document.getElementById('chatBadge');
    badge.style.display = 'none';
    badge.textContent = '0';
    const mb = document.getElementById('mobChatBadge');
    if (mb) { mb.classList.remove('show'); mb.textContent = ''; }
  }
};

window.mobileOpenTab = function(tab, btn){
  // Ensure panel is open
  const panel = document.getElementById('sidePanel');
  panel.classList.add('open');
  panel.classList.remove('hidden');
  panelOpen = true;
  // Highlight mobile tab buttons
  document.querySelectorAll('.mob-tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Switch the desktop tab too
  const desktopTabMap = { chat:'chat', participants:'participants', hands:'hands' };
  const desktopTab = document.querySelector(`.ls-tab[onclick*="'${desktopTabMap[tab]}'"]`);
  if (desktopTab) switchTab(tab, desktopTab);
  else {
    document.querySelectorAll('.ls-pane').forEach(p=>p.classList.remove('active'));
    document.getElementById('pane-'+tab).classList.add('active');
    if (tab === 'chat') {
      chatUnread = 0;
      const mb = document.getElementById('mobChatBadge');
      if (mb) { mb.classList.remove('show'); mb.textContent = ''; }
    }
  }
};

/* ──────────────── END / LEAVE ──────────────── */
window.handleEndOrLeave = async function(){
  if (isHost) {
    const confirmed = await showConfirm({
      icon:'📴', title:'End the class?',
      sub:'All participants will be disconnected and the session will be marked as ended.',
      okLabel:'End Class', okStyle:'color:#FCA5A5;background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.3);'
    });
    if (!confirmed) return;
    await leaveOrEnd(true);
  } else {
    await leaveOrEnd(false);
  }
};

async function leaveOrEnd(endSession){
  clearInterval(durationInterval);
  // Unsubscribe
  if (chatUnsub)    { chatUnsub();    chatUnsub=null; }
  if (sessionUnsub) { sessionUnsub(); sessionUnsub=null; }
  // Stop tracks
  [localAudioTrack, localVideoTrack, screenTrack].forEach(async t=>{
    if (!t) return;
    try { await agoraClient?.unpublish([t]); } catch(e){}
    try { t.stop(); t.close(); } catch(e){}
  });
  localAudioTrack = localVideoTrack = screenTrack = null;
  // Leave Agora
  if (agoraClient) { try { await agoraClient.leave(); } catch(e){} agoraClient=null; }
  // Update Firestore
  if (sessionId) {
    try {
      if (endSession) {
        await updateDoc(doc(db,'liveSessions',sessionId),{ status:'ended', endedAt:serverTimestamp(), viewerCount:0 });
      }
      // Viewer count decrement handled by pagehide listener for non-hosts
    } catch(e){}
  }
  // Navigate back
  const back = isAdmin ? 'admin.html' : 'student.html';
  location.href = back;
}

window.handleBack = function(e){
  e.preventDefault();
  showConfirm({
    icon:'👋', title:'Leave session?',
    sub:'You will exit the live class.',
    okLabel:'Leave'
  }).then(ok=>{ if(ok) leaveOrEnd(false); });
};

window.toggleSettings = function(){ showToast('Session settings coming soon.','info'); };

/* ──────────────── PiP DRAG ──────────────── */
(function initPipDrag(){
  const pip = document.getElementById('pipEl');
  let dragging=false, ox=0, oy=0, ex=0, ey=0;
  pip.addEventListener('mousedown', e=>{ dragging=true; ox=e.clientX-pip.offsetLeft; oy=e.clientY-pip.offsetTop; pip.style.cursor='grabbing'; e.preventDefault(); });
  window.addEventListener('mousemove', e=>{ if(!dragging)return; let x=e.clientX-ox, y=e.clientY-oy; pip.style.right='auto'; pip.style.bottom='auto'; pip.style.left=x+'px'; pip.style.top=y+'px'; });
  window.addEventListener('mouseup', ()=>{ dragging=false; pip.style.cursor='move'; });
  pip.addEventListener('touchstart', e=>{ const t=e.touches[0]; ox=t.clientX-pip.offsetLeft; oy=t.clientY-pip.offsetTop; },{passive:true});
  pip.addEventListener('touchmove', e=>{ const t=e.touches[0]; pip.style.right='auto'; pip.style.bottom='auto'; pip.style.left=(t.clientX-ox)+'px'; pip.style.top=(t.clientY-oy)+'px'; e.preventDefault(); },{passive:false});
})();

}`;

/* ──────────────── KEYBOARD SHORTCUTS ──────────────── */
document.addEventListener('keydown', e=>{
  if (['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if (e.code==='Space' && !e.shiftKey) { e.preventDefault(); toggleMic(); }
  if (e.code==='KeyV') toggleCam();
  if (e.code==='KeyS' && (e.ctrlKey||e.metaKey)) { e.preventDefault(); toggleScreenShare(); }
  if (e.key==='Escape') {
    if (document.getElementById('confirmOverlay').classList.contains('show')) confirmReject();
  }
});

document.addEventListener('visibilitychange',()=>{
  if (document.hidden && isHost && localVideoTrack) {
    // Don't stop; just let it run
  }

if (true) { // runs after sessionId is set
  setTimeout(()=>{
    if (!sessionId) return;
    onSnapshot(doc(db,'liveSessions',sessionId), snap=>{
      if (!snap.exists()) return;
      const d = snap.data();
      raisedHands = d.raisedHands || {};
      renderRaisedHands();
    });
  }, 2000);
}
